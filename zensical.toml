[project]
site_name = "读书笔记"
site_description = "书籍是与大师对话的最好方式"
site_author = "palemoky"
site_url = "https://readings.palemoky.com"
repo_url = "https://github.com/palemoky"
repo_name = "palemoky"
copyright = "Copyright © 2026 Palemoky"
extra_javascript = [
  "assets/javascripts/mathjax.js",
  "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js",
]
extra_css = [
  "assets/stylesheets/extra.css",
]

[theme]
name = "material"
language = "zh"
favicon = "assets/logo.png"
logo = "assets/logo.png"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/file-edit"

[theme.features]
items = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
  "navigation.expand",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
]

[extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/palemoky"


[nav]
"首页" = "index.md"

[nav.computer]
title = "计算机"
"深入理解计算机系统" = "csapp/README.md"
